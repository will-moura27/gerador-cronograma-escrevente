<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronograma Escrevente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="logo-container" style="text-align: center; margin-bottom: 2rem;">
    <img src="logo.png" alt="Meta Ciclo Logo" style="max-width: 100%; height: auto; border-radius: 8px;">
</div>
        <div class="card">
            <label>Horas livres por dia:</label>
            <input type="number" id="horas" min="1" max="12" placeholder="Ex: 2">
            
            <label>Dias de estudo:</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Segunda"> Seg</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Terça"> Ter</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Quarta"> Qua</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Quinta"> Qui</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Sexta"> Sex</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Sábado"> Sáb</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Domingo"> Dom</label>
            </div>
            
            <button onclick="gerarCronograma()">Gerar Cronograma</button>
        </div>

        <div id="resultado" class="resultado-container hidden">
            <div class="progress-wrapper">
                <div id="progress-text">0% concluído</div>
                <div class="progress-bar"><div id="progress-fill" style="width: 0%"></div></div>
            </div>
            
            <div id="tabela-cronograma"></div>
            
            <div class="botoes-acao">
                <button class="btn-secundario" onclick="baixarPDF()">Baixar PDF</button>
                <button class="btn-terciario" onclick="limparCronograma()">Limpar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
