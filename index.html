<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ciclo</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="btn-instalar" class="hidden">📲 Instalar Meta Ciclo</button>

        <div class="logo-container" style="text-align: center; margin-bottom: 2rem;">
            <img src="logo.png" alt="Meta Ciclo Logo" style="max-width: 100%; height: auto; border-radius: 8px;">
        </div>
        
        <div class="card">
            <label>Cadastrar Matérias Manualmente:</label>
            <div class="input-group">
                <input type="text" id="nova-materia" placeholder="Ex: Direito Constitucional">
                <button onclick="adicionarMateria()" class="btn-add">Adicionar</button>
            </div>
            
            <div class="template-section">
                <span class="ou-divisor">OU</span>
                <button onclick="carregarTemplateEscrevente()" class="btn-template">📚 Carregar Edital Escrevente</button>
            </div>

            <div class="header-lista">
                <label>Suas Matérias:</label>
                <button onclick="limparTodasMaterias()" class="btn-limpar-lista">Esvaziar Lista</button>
            </div>
            <div id="lista-materias" class="tags-container"></div>

            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #e2e8f0;">

            <label>Horas livres por dia:</label>
            <input type="number" id="horas" min="1" max="12" placeholder="Ex: 2">
            
            <label>Dias de estudo:</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Segunda"> Seg</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Terça"> Ter</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Quarta"> Qua</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Quinta"> Qui</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Sexta"> Sex</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Sábado"> Sáb</label>
                <label class="checkbox-label"><input type="checkbox" name="dias" value="Domingo"> Dom</label>
            </div>
            
            <button onclick="gerarCronograma()">Gerar Cronograma</button>
        </div>

        <div id="resultado" class="resultado-container hidden">
            <div>
                <span id="progress-text">0% concluído</span>
                <div class="progress-bar"><div id="progress-fill" style="width: 0%"></div></div>
            </div>
            <div id="tabela-cronograma"></div>
            <div class="botoes-acao">
                <button class="btn-secundario" onclick="baixarPDF()">Baixar PDF</button>
                <button class="btn-terciario" onclick="limparCronograma()">Recomeçar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }
    </script>
</body>
</html>
